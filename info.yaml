project:
  title:      "CMOS based Temperature Sensor"
  description: "A digital controller mimicking the comparator and switching logic of an analog thermal circuit."
  how_it_works: "Takes digital representations of analog comparator stages as inputs and drives a switching transistor output (Q11) based on threshold logic."
  how_to_test: "Apply high/low signals to input pins to simulate op-amp trigger points and observe the output state on uo_out[0]."
  author:      "Oyediran Abdulmalik Adéwálé"
  revision:    "1.0"
  license:     "Apache-2.0"

# Register your inputs/outputs here
inputs:
  - "u1_out"      # Input from first Op-Amp stage (U1)
  - "u2_out"      # Input from second Op-Amp stage (U2)
  - "rt1_state"   # Digital threshold from RT1
  - "rt2_state"   # Digital threshold from RT2
  - "none"
  - "none"
  - "none"
  - "none"
outputs:
  - "q11_drive"   # Output to base of Q11 transistor
  - "none"
  - "none"
  - "none"
  - "none"
  - "none"
  - "none"
  - "none"
bidirectional:
  - "none"
  - "none"
  - "none"
  - "none"
  - "none"
  - "none"
  - "none"
  - "none"

# Do not change!
yaml_version: 6
